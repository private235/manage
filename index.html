<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6C5CE7;
            --dark-color: #2D3436;
            --light-color: #F5F6FA;
            --danger-color: #E74C3C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--light-color);
            color: var(--dark-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
        }

        h2 {
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            text-align: right;
            font-family: 'Tajawal', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s;
            width: 100%;
            font-family: 'Tajawal', sans-serif;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
            text-align: right;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
        }

        .checking-session {
            color: var(--primary-color);
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="form-container" id="login-form">
        <h2>لوحة تحكم المشرف</h2>
        <div class="form-group">
            <input type="email" id="email-input" placeholder="البريد الإلكتروني" class="form-control">
        </div>
        <div class="form-group">
            <input type="password" id="password-input" placeholder="كلمة المرور" class="form-control">
        </div>
        <button class="btn" id="login-btn">
            <span id="login-text">دخول</span>
            <span id="login-loader" class="loading" style="display: none;"></span>
        </button>
        <div id="password-alert" class="alert alert-danger"></div>
    </div>

    <!-- جاري التحقق من الجلسة -->
    <div id="session-check" style="display: none;">
        <div class="loading" style="border-color: rgba(108,92,231,.3); border-top-color: #6C5CE7; width: 40px; height: 40px;"></div>
        <p class="checking-session">جاري التحقق من الجلسة...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="auth-guard.js"></script>

    <script>
        const loginForm = document.getElementById('login-form');
        const sessionCheck = document.getElementById('session-check');

        // عند تحميل الصفحة: تحقق هل المستخدم مسجل دخول بالفعل
        loginForm.style.display = 'none';
        sessionCheck.style.display = 'block';

        firebase.auth().onAuthStateChanged(async (user) => {
            if (user) {
                // مسجل دخول → تحقق هل أدمن
                try {
                    const snapshot = await firebase.database().ref('admins/' + user.uid).once('value');
                    if (snapshot.val() === true) {
                        // أدمن + جلسة محفوظة → ادخل مباشرة
                        window.location.href = 'admin.html';
                        return;
                    }
                } catch (e) {
                    console.error(e);
                }
            }
            // مش مسجل أو مش أدمن → اظهر فورم تسجيل الدخول
            sessionCheck.style.display = 'none';
            loginForm.style.display = 'block';
        });

        // دالة تسجيل الدخول
        async function handleLogin() {
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value.trim();
            const loginBtn = document.getElementById('login-btn');
            const loginText = document.getElementById('login-text');
            const loginLoader = document.getElementById('login-loader');
            const passwordAlert = document.getElementById('password-alert');

            if (!email || !password) {
                passwordAlert.textContent = 'يرجى إدخال البريد الإلكتروني وكلمة المرور.';
                passwordAlert.style.display = 'block';
                return;
            }

            loginText.style.display = 'none';
            loginLoader.style.display = 'inline-block';
            loginBtn.disabled = true;
            passwordAlert.style.display = 'none';

            const result = await adminLogin(email, password, 'admin.html');

            if (!result.success) {
                passwordAlert.textContent = result.error;
                passwordAlert.style.display = 'block';
            }

            loginText.style.display = 'inline-block';
            loginLoader.style.display = 'none';
            loginBtn.disabled = false;
        }

        document.getElementById('login-btn').addEventListener('click', handleLogin);
        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('email-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('password-input').focus();
        });
    </script>
</body>
</html>
